<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="星晶採集 — 點擊採集、建造設施、購買升級並轉生，累積天文數字的星晶。">
    <title>星晶採集 | Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../games.css">
    <link rel="stylesheet" href="idle.css">
</head>

<body>
    <top-nav page="games" root="../.."></top-nav>

    <main class="game-tool-page game-tool-page--idle section">
        <div class="container game-page-nav">
            <a class="game-back" href="../index.html">&larr; Games catalog</a>
            <h1 class="game-page-title">星晶採集</h1>
        </div>

        <div class="container idle-page-container">
            <div class="idle-layout">
                <section class="idle-main-panel" aria-label="採集區">
                    <div class="idle-stats-compact" aria-label="遊戲數據">
                        <span class="idle-stats-primary">
                            <span class="idle-stats-crystal" id="crystalCount">0</span>
                            <span class="idle-stats-unit">星晶</span>
                        </span>
                        <span class="idle-stats-sep" aria-hidden="true">·</span>
                        <span class="idle-stats-item" id="cpsValue">+0/s</span>
                        <span class="idle-stats-sep" aria-hidden="true">·</span>
                        <span class="idle-stats-item">點擊 <span id="clickPower">1</span></span>
                        <span class="idle-stats-sep" aria-hidden="true">·</span>
                        <span class="idle-stats-item">
                            碎片 <span id="shardCount">0</span>
                            <span class="idle-stats-sub" id="prestigeBonus">(+0%)</span>
                        </span>
                    </div>

                    <div class="idle-click-scene" id="clickScene">
                        <div class="idle-star-layer" id="starLayer" aria-hidden="true"></div>
                        <div class="idle-mission-hud" id="missionHud" aria-live="polite"></div>
                        <div class="idle-event-hud" id="eventHud" aria-live="polite"></div>
                        <div class="idle-skill-hud" id="skillHud" aria-label="主動技能"></div>
                        <div class="idle-click-glow" id="clickGlow" aria-hidden="true"></div>
                        <div class="idle-click-wrap">
                            <button type="button" class="idle-click-btn" id="clickBtn" aria-label="手動採集星晶">
                                <span class="idle-click-icon" aria-hidden="true">✦</span>
                                <span class="idle-click-label">採集星晶</span>
                            </button>
                        </div>
                    </div>
                </section>

                <section class="idle-shop-panel" id="shopPanel" aria-label="商店">
                    <div class="idle-shop-toolbar">
                        <div class="idle-tab-bar" id="tabBar" role="tablist" aria-label="商店分頁"></div>
                        <div class="idle-shop-toolbar-actions">
                            <button type="button" class="idle-desc-toggle" id="descToggleBtn" aria-pressed="false"
                                hidden>
                                說明
                            </button>
                            <button type="button" class="idle-desc-toggle" id="codexOpenBtn" aria-haspopup="dialog">
                                圖鑑
                            </button>
                            <div class="idle-buy-mode-bar" id="buyModeBar" role="group" aria-label="購買數量"></div>
                        </div>
                    </div>

                    <div class="idle-shop-content">
                        <div class="idle-shop-list idle-shop-panel--active" id="buildingList" role="tabpanel"
                            aria-label="建築"></div>
                        <div class="idle-shop-list" id="upgradeList" role="tabpanel" aria-label="升級" hidden></div>
                        <div class="idle-prestige-panel" id="prestigePanel" role="tabpanel" aria-label="轉生" hidden>
                            <div class="idle-prestige-preview" id="prestigePreview"></div>
                            <button type="button" class="btn btn-primary idle-prestige-btn" id="prestigeBtn">
                                轉生
                            </button>
                        </div>
                        <div class="idle-artifact-panel" id="artifactPanel" role="tabpanel" aria-label="神器" hidden>
                            <div class="idle-artifact-automation" id="artifactAutomation"></div>
                            <div class="idle-artifact-preview" id="artifactPreview"></div>
                        </div>

                    </div>
                </section>
            </div>
        </div>
    </main>

    <div class="idle-artifact-toast" id="artifactToast" role="status" aria-live="polite" hidden></div>

    <div class="idle-codex-modal" id="codexModal" role="dialog" aria-modal="true" aria-label="圖鑑" hidden>
        <div class="idle-codex-modal-card">
            <div class="idle-codex-modal-head">
                <h2 class="idle-codex-modal-title">圖鑑</h2>
                <button type="button" class="btn btn-outline idle-codex-close" id="codexCloseBtn">關閉</button>
            </div>
            <div class="idle-codex-tabbar" id="codexTabBar" role="tablist" aria-label="圖鑑分頁"></div>
            <div class="idle-codex-preview" id="codexPreview"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>&copy; <span id="year"></span> Kam Hei Au. Games.</p>
            <a href="../../index.html">Portfolio</a>
        </div>
    </footer>

    <script src="../../shared/top-nav.js"></script>
    <script src="../../script.js"></script>
    <script src="numbers.js"></script>
    <script src="data.js"></script>
    <script src="save.js"></script>
    <script src="stars.js"></script>
    <script src="app.js"></script>
</body>

</html>
