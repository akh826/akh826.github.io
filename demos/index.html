<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Frontend demos catalog">
    <title>Demos Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="demos.css">
</head>

<body>
    <header class="site-header">
        <nav class="nav container">
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">Menu</button>
            <ul class="nav-links" id="navLinks">
                <li class="nav-sections-group">
                    <span class="nav-area-label">Portfolio</span>
                    <ul class="nav-sections-list">
                        <li><a href="../index.html" class="nav-link nav-link-section">Home</a></li>
                    </ul>
                </li>
                <li class="nav-divider" aria-hidden="true"></li>
                <li>
                    <a href="../tools/index.html" class="nav-link nav-link-tools">
                        <span class="nav-tools-icon" aria-hidden="true">⬡</span>
                        Tools
                    </a>
                </li>
                <li>
                    <a href="index.html" class="nav-link nav-link-demos active">
                        <span class="nav-tools-icon" aria-hidden="true">▦</span>
                        Demos
                    </a>
                </li>
            </ul>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">Dark</button>
        </nav>
    </header>

    <main class="demo-page section">
        <div class="container">
            <header class="demo-header">
                <h1>Demos Catalog</h1>
                <p class="demo-intro">
                    Interactive examples that explain implementation ideas.
                    Use these demos to learn patterns and responsive UI behavior.
                </p>
            </header>

            <section class="catalog-favorites-section" id="favoritesSection" hidden>
                <h2 class="catalog-section-title">Favorites</h2>
                <div class="demo-catalog-grid" id="favoritesGrid"></div>
            </section>

            <div class="catalog-toolbar">
                <label class="catalog-search">
                    <span class="catalog-search-label">Search</span>
                    <input type="search" id="catalogSearch" class="catalog-search-input"
                        placeholder="Filter by demo name..." autocomplete="off">
                </label>
                <div class="catalog-tag-bar">
                    <span class="catalog-tag-bar-label">Tags</span>
                    <div class="catalog-tag-filters" id="tagFilters" role="group" aria-label="Filter by tag"></div>
                </div>
            </div>

            <section class="catalog-all-section">
                <h2 class="catalog-section-title" id="allToolsHeading">All demos</h2>
                <div class="demo-catalog-grid" id="catalogGrid"></div>
                <p class="catalog-empty" id="catalogEmpty" hidden>No demos match your search or tag.</p>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>&copy; <span id="year"></span> Kam Hei Au. Demos.</p>
            <a href="../index.html">Portfolio</a>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="catalog.js"></script>
    <script src="catalog-page.js"></script>
</body>

</html>
