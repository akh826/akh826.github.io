<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browser utility tools catalog">
  <title>Tools Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="tools.css">
</head>

<body>
  <top-nav page="tools" root=".."></top-nav>

  <main class="tool-page section">
    <div class="container">
      <header class="tool-header">
        <h1>Tools Catalog</h1>
        <p class="tool-intro">
          Star tools to pin them at the top. Favorites are saved in this browser.
          Filter by name or tag below.
        </p>
      </header>

      <section class="catalog-favorites-section" id="favoritesSection" hidden>
        <h2 class="catalog-section-title">Favorites</h2>
        <div class="tool-catalog-grid" id="favoritesGrid"></div>
      </section>

      <div class="catalog-toolbar">
        <label class="catalog-search">
          <span class="catalog-search-label">Search</span>
          <input type="search" id="catalogSearch" class="catalog-search-input" placeholder="Filter by tool name…"
            autocomplete="off">
        </label>
        <div class="catalog-tag-bar">
          <span class="catalog-tag-bar-label">Tags</span>
          <div class="catalog-tag-filters" id="tagFilters" role="group" aria-label="Filter by tag"></div>
        </div>
      </div>

      <section class="catalog-all-section">
        <h2 class="catalog-section-title" id="allToolsHeading">All tools</h2>
        <div class="tool-catalog-grid" id="catalogGrid"></div>
        <p class="catalog-empty" id="catalogEmpty" hidden>No tools match your search or tag.</p>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>© <span id="year"></span> Kam Hei Au. Tools.</p>
      <a href="../index.html">Portfolio</a>
    </div>
  </footer>

  <script src="../shared/top-nav.js"></script>
  <script src="../script.js"></script>
  <script src="catalog.js"></script>
  <script src="catalog-page.js"></script>
</body>

</html>
